<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HTTP Client Commons - Preview</title>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Code highlighting -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.7;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }

    body.has-content .page {
      align-items: flex-start;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    .upload-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
      padding: 28px 22px;
      border-radius: 14px;
      border: 1px solid #30363d;
      background: #161b22;
    }

    body.has-content .upload-panel {
      margin-bottom: 28px;
    }

    .upload-title {
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0.2px;
      color: #c9d1d9;
    }

    .upload-subtitle {
      margin-top: -6px;
      font-size: 13px;
      color: #8b949e;
    }

    .upload-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #c9d1d9;
      font-weight: 650;
      cursor: pointer;
      user-select: none;
      transition: border-color 120ms ease, transform 120ms ease;
    }

    .upload-button:hover {
      border-color: #58a6ff;
      transform: translateY(-1px);
    }

    .upload-button:active {
      transform: translateY(0);
    }

    .upload-button:focus-visible {
      outline: 2px solid #58a6ff;
      outline-offset: 3px;
    }

    #fileInput {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    h1, h2, h3 {
      border-bottom: 1px solid #30363d;
      padding-bottom: 6px;
      margin-top: 30px;
    }

    h1 { color: #58a6ff; }
    h2 { color: #79c0ff; }
    h3 { color: #a5d6ff; }

    p {
      margin: 14px 0;
      font-size: 16px;
    }

    code {
      background: #161b22;
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    pre {
      background: #161b22;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
    }

    blockquote {
      border-left: 4px solid #58a6ff;
      padding-left: 15px;
      color: #8b949e;
      margin: 20px 0;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul, ol {
      padding-left: 22px;
      margin: 10px 0;
    }

    li {
      margin: 6px 0;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #30363d;
      padding: 10px;
    }

    th {
      background: #161b22;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="container">
      <div class="upload-panel">
        <div class="upload-title">Upload your .md file</div>
        <div class="upload-subtitle">Choose a Markdown file to preview it here</div>

        <label class="upload-button" for="fileInput">Choose file</label>
        <input type="file" id="fileInput" accept=".md,text/markdown" />
      </div>

      <div id="content"></div>
    </div>
  </div>

<script>
  const input = document.getElementById("fileInput");

  input.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
      document.getElementById("content").innerHTML = marked.parse(e.target.result);
      hljs.highlightAll();
      document.body.classList.add("has-content");
    };
    reader.readAsText(file);
  });
</script>
</body>
</html>
